<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KENDLE Labs — OG Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FFFFFF;
      --surface: #F5F5F5;
      --green: #00CC6A;
      --green-bright: #00FF88;
      --green-light: #E6FFF2;
      --text: #0A0F1A;
      --text-muted: #5C6370;
      --border: #E8E8E8;
    }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Geist', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .og {
      position: relative;
      width: 1200px;
      height: 630px;
      padding: 72px 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: var(--bg);
      overflow: hidden;
    }

    /* Subtle grid */
    .og::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(10,15,26,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(10,15,26,0.05) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 80%);
    }

    /* no glow — clean white bg */

    .og__top, .og__bottom {
      position: relative;
      z-index: 2;
    }

    .og__logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 56px;
    }

    .og__logo-mark {
      width: 64px;
      height: 64px;
      display: block;
    }

    .og__brand {
      font-family: 'Geist', sans-serif;
      font-weight: 700;
      font-size: 30px;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .og__brand em {
      font-style: normal;
      color: var(--green);
      font-weight: 500;
      margin-left: 6px;
      font-size: 22px;
    }

    .og__headline {
      font-family: 'Geist', sans-serif;
      font-weight: 700;
      font-size: 86px;
      line-height: 1.02;
      letter-spacing: -0.04em;
      max-width: 1040px;
      color: var(--text);
    }

    .og__headline .highlight {
      display: inline-block;
      padding: 2px 20px;
      border-radius: 16px;
      background: var(--green-light);
      color: var(--green);
      font-style: italic;
    }

    .og__sub {
      margin-top: 28px;
      font-family: 'Geist', sans-serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--text-muted);
      max-width: 820px;
      line-height: 1.45;
    }

    .og__stats {
      display: flex;
      gap: 56px;
      align-items: center;
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }

    .og__stat {
      display: flex;
      flex-direction: column;
    }

    .og__stat-num {
      font-family: 'Geist', sans-serif;
      font-weight: 700;
      font-size: 38px;
      color: var(--green);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .og__stat-label {
      font-family: 'Geist Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .og__url {
      margin-left: auto;
      font-family: 'Geist Mono', monospace;
      font-size: 20px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="og">
    <div class="og__top">
      <div class="og__logo">
        <svg class="og__logo-mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="KENDLE mark">
          <defs>
            <linearGradient id="kendleGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#00E08A"/>
              <stop offset="55%" stop-color="#4DE83A"/>
              <stop offset="100%" stop-color="#B6E61D"/>
            </linearGradient>
          </defs>
          <rect x="23" y="8" width="18" height="48" rx="9" fill="url(#kendleGrad)"/>
        </svg>
        <div class="og__brand">KENDLE <em>Labs</em></div>
      </div>
      <h1 class="og__headline">We build &amp; run your<br>marketing <span class="highlight">Engine</span></h1>
      <p class="og__sub">A 3-person team taking projects from PMF to scale. Powered by AI agents.</p>
    </div>
    <div class="og__bottom">
      <div class="og__stats">
        <div class="og__stat">
          <div class="og__stat-num">$26M</div>
          <div class="og__stat-label">locked in 3 min</div>
        </div>
        <div class="og__stat">
          <div class="og__stat-num">100K</div>
          <div class="og__stat-label">signups</div>
        </div>
        <div class="og__stat">
          <div class="og__stat-num">$35M+</div>
          <div class="og__stat-label">volume generated</div>
        </div>
        <div class="og__url">labs.kendle.xyz</div>
      </div>
    </div>
  </div>
</body>
</html>
